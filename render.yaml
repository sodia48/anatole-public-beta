databases:
  - name: anatole-db
    plan: starter
    databaseName: anatole
    user: anatole

services:
  - type: web
    name: anatole-public-beta
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /_stcore/health
    envVars:
      - key: ANATOLE_HOSTING_PROFILE
        value: starter
      - key: DATABASE_URL
        fromDatabase:
          name: anatole-db
          property: connectionString
      - key: ANATOLE_PUBLIC_BETA
        value: "true"
      - key: ANATOLE_ACCESS_MODE
        value: "hybrid"
      - key: ANATOLE_ENV
        value: "production"
      - key: ANATOLE_LOG_LEVEL
        value: "INFO"
      - key: ANATOLE_NEWS_MAX_TICKERS
        value: "4"
      - key: ANATOLE_NEWS_WORKERS
        value: "1"
      - key: ANATOLE_NEWS_TIMEOUT
        value: "12"
      - key: ANATOLE_NEWS_PER_TICKER
        value: "5"
      - key: ANATOLE_NEWS_MAX_ARTICLES
        value: "35"
      - key: ANATOLE_TSX_COMPOSITE_SNAPSHOT_LIMIT
        value: "100"
      - key: ANATOLE_TSX_COMPOSITE_HISTORY_LIMIT
        value: "50"
      - key: ANATOLE_TSX_FULL_SNAPSHOT_LIMIT
        value: "80"
      - key: ANATOLE_TSX_FULL_HISTORY_LIMIT
        value: "35"
