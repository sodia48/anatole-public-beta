databases:
  - name: anatole-db
    plan: free
    databaseName: anatole
    user: anatole

services:
  - type: web
    name: anatole-public-beta
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /_stcore/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: anatole-db
          property: connectionString
      - key: ANATOLE_PUBLIC_BETA
        value: "true"
      - key: ANATOLE_ACCESS_MODE
        value: "hybrid"
      - key: ANATOLE_ENV
        value: "production"
      - key: ANATOLE_LOG_LEVEL
        value: "INFO"
